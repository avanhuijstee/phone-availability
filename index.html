<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beschikbaar voor een belletje?</title>
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      color: #1a202c;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #64748b; margin-bottom: 32px; font-size: 0.95rem; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .name-row { display: flex; gap: 10px; }

    input[type="text"], input[type="password"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: #6366f1; }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #toggleBtn { background: #22c55e; color: white; min-width: 130px; }
    #toggleBtn.active { background: #ef4444; }
    #toggleBtn:disabled { background: #cbd5e1; cursor: not-allowed; }

    .status-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-badge.available { background: #dcfce7; color: #15803d; }
    .status-badge.unavailable { background: #f1f5f9; color: #64748b; }

    .list-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .list-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    #userList { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    #userList li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #f8fafc;
      border-radius: 10px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #6366f1;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .user-info strong { display: block; font-size: 0.95rem; }
    .user-info span { font-size: 0.78rem; color: #94a3b8; }
    .empty { text-align: center; color: #94a3b8; font-size: 0.9rem; padding: 16px 0; }
    .conn-status { font-size: 0.75rem; color: #94a3b8; margin-top: 20px; }

    /* Wachtwoordscherm */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #loginBox {
      background: white;
      border-radius: 16px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #loginBox h2 { font-size: 1.2rem; font-weight: 700; }
    #loginBox p { font-size: 0.9rem; color: #64748b; }

    #loginBtn {
      background: #6366f1;
      color: white;
      padding: 11px;
      font-size: 1rem;
      border-radius: 10px;
      width: 100%;
    }

    #loginError {
      color: #ef4444;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Wachtwoordscherm -->
  <div id="loginOverlay">
    <div id="loginBox">
      <h2>🔒 Inloggen</h2>
      <p>Vul het wachtwoord in om de app te gebruiken.</p>
      <input type="password" id="passwordInput" placeholder="Wachtwoord" />
      <span id="loginError">Ongeldig wachtwoord, probeer opnieuw.</span>
      <button id="loginBtn" onclick="login()">Inloggen</button>
    </div>
  </div>

  <!-- Hoofdapp -->
  <h1>📞 Beschikbaar voor een belletje?</h1>
  <p class="subtitle">Geef aan wanneer je gebeld kan worden.</p>

  <div class="card">
    <div class="name-row">
      <input type="text" id="nameInput" placeholder="Jouw naam" maxlength="40" />
      <button id="toggleBtn" disabled onclick="toggle()">Beschikbaar</button>
    </div>
    <span id="statusBadge" class="status-badge unavailable">Niet beschikbaar</span>
  </div>

  <div class="list-card">
    <h2><span class="dot"></span> Nu beschikbaar</h2>
    <ul id="userList"><li class="empty">Niemand is momenteel beschikbaar.</li></ul>
  </div>

  <p class="conn-status" id="connStatus">Verbinding maken...</p>

<script>
  const VAPID_PUBLIC_KEY = "BA0OGabqiZDlk_g8vfvHnEK8-6zdGsn41JcXTWck4MydBaCvqGg9Oog6mE4-OxGCgB9QGafQdbJvsqI1qIhVJS0";

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = window.atob(base64);
    const output = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) output[i] = raw.charCodeAt(i);
    return output;
  }

  async function subscribeToPush() {
    if (!("PushManager" in window) || !("serviceWorker" in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      await fetch("/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: sessionToken, subscription: sub.toJSON() }),
      });
    } catch (e) {}
  }

  let ws, myName = null, isAvailable = false, users = {};
  let sessionToken = localStorage.getItem("token");

  const nameInput = document.getElementById("nameInput");
  const toggleBtn = document.getElementById("toggleBtn");
  const statusBadge = document.getElementById("statusBadge");
  const userList = document.getElementById("userList");
  const connStatus = document.getElementById("connStatus");
  const loginOverlay = document.getElementById("loginOverlay");
  const passwordInput = document.getElementById("passwordInput");
  const loginError = document.getElementById("loginError");

  // Enter-toets werkt op wachtwoordveld
  passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });

  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");

  async function login() {
    const password = passwordInput.value;
    const res = await fetch("/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password }),
    });

    if (res.ok) {
      const data = await res.json();
      sessionToken = data.token;
      localStorage.setItem("token", sessionToken);
      loginOverlay.style.display = "none";
      requestNotificationPermission();
      connect();
      subscribeToPush();
    } else {
      loginError.style.display = "block";
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  // Naam ophalen uit localStorage
  const savedName = localStorage.getItem("userName");
  if (savedName) {
    nameInput.value = savedName;
    toggleBtn.disabled = false;
  }

  nameInput.addEventListener("input", () => {
    toggleBtn.disabled = nameInput.value.trim() === "";
    if (nameInput.value.trim()) localStorage.setItem("userName", nameInput.value.trim());
  });

  nameInput.addEventListener("change", () => {
    if (isAvailable) { sendUnavailable(myName); isAvailable = false; myName = null; updateOwnStatus(); }
  });

  function toggle() {
    const name = nameInput.value.trim();
    if (!name) return;
    if (!isAvailable) { myName = name; isAvailable = true; sendAvailable(name); }
    else { sendUnavailable(myName); isAvailable = false; myName = null; }
    updateOwnStatus();
  }

  function sendAvailable(name) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "available", name })); }
  function sendUnavailable(name) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "unavailable", name })); }

  function updateOwnStatus() {
    if (isAvailable) {
      toggleBtn.textContent = "Niet meer beschikbaar";
      toggleBtn.classList.add("active");
      statusBadge.textContent = "Je bent beschikbaar";
      statusBadge.className = "status-badge available";
    } else {
      toggleBtn.textContent = "Beschikbaar";
      toggleBtn.classList.remove("active");
      statusBadge.textContent = "Niet beschikbaar";
      statusBadge.className = "status-badge unavailable";
    }
  }

  function renderList() {
    const entries = Object.entries(users);
    if (entries.length === 0) { userList.innerHTML = '<li class="empty">Niemand is momenteel beschikbaar.</li>'; return; }
    userList.innerHTML = entries.map(([name, since]) => {
      const letter = name.charAt(0).toUpperCase();
      const time = new Date(since).toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
      const isMe = name === myName ? " (jij)" : "";
      return `<li><div class="avatar">${letter}</div><div class="user-info"><strong>${name.replace(/&/g,"&amp;").replace(/</g,"&lt;")}${isMe}</strong><span>Beschikbaar sinds ${time}</span></div></li>`;
    }).join("");
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws?token=${sessionToken}`);

    let pingInterval;

    ws.onopen = () => {
      connStatus.textContent = "Verbonden";
      pingInterval = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
      }, 30000);
    };
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "state") { users = msg.users; renderList(); }
      else if (msg.type === "available") { users[msg.name] = msg.since; renderList(); if (msg.name !== myName) notify(msg.name); }
      else if (msg.type === "unavailable") { delete users[msg.name]; renderList(); }
    };
    ws.onclose = (e) => {
      clearInterval(pingInterval);
      if (e.code === 4001) {
        localStorage.removeItem("token");
        sessionToken = null;
        loginOverlay.style.display = "flex";
      } else {
        connStatus.textContent = "Verbinding verbroken. Herverbinden in 3s...";
        setTimeout(connect, 3000);
      }
    };
    ws.onerror = () => { ws.close(); };
  }

  window.addEventListener("beforeunload", () => { if (isAvailable && myName) sendUnavailable(myName); });

  // Direct inloggen als er al een geldig token is
  function requestNotificationPermission() {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }

  function notify(name) {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    const title = "📞 Beschikbaar voor een belletje!";
    const options = { body: `${name} is nu beschikbaar.`, icon: "/static/android-chrome-192x192.png" };
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(reg => reg.showNotification(title, options));
    } else {
      new Notification(title, options);
    }
  }

  if (sessionToken) {
    loginOverlay.style.display = "none";
    requestNotificationPermission();
    connect();
    subscribeToPush();
  }
</script>
</body>
</html>
